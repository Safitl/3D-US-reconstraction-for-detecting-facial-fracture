description: "SAM2Rad fine-tuning for facial ultrasound bone cortex segmentation."

image_encoder: "sam2_tiny_hiera"
mask_decoder: "sam2_lora_mask_decoder"
prompt_predictor: "sam2_high_res_ppn"
sam_checkpoint: "weights/sam2_hiera_tiny.pt"

wandb_project_name: "bone_seg"

dataset:
  name: bone_seg
  root: datasets/bone_segmentation
  image_size: 1024
  split: 0.99         # use nearly all Train/ for training; val comes from Test/ (Patient2)
  seed: 42
  batch_size: 1
  num_workers: 0
  num_classes: 1      # bone cortex only
  num_tokens: 10

training:
  max_epochs: 100
  save_path: ../../runs/sam2rad_bone_seg_v3
  resume: ../../runs/sam2rad_bone_seg_v3/last.ckpt   # continue interrupted run from epoch 37 -> 100
